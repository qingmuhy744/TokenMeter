repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        files: \.(py)$
        pass_filenames: true
      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix
        language: system
        files: \.(py)$
        pass_filenames: true
      - id: eslint
        name: eslint --fix
        entry: npx eslint --config frontend/eslint.config.js --fix
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: true
