name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python deps
        run: uv sync

      - name: Lint Python
        run: uv run ruff check backend/

      - name: Test Python
        run: uv run pytest -v

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Type check frontend
        run: cd frontend && npx tsc --noEmit

      - name: Build frontend
        run: cd frontend && npm run build

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract branch name
        id: branch
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"

      - name: Generate docker tags
        id: tags
        run: |
          DATE=$(date +%Y%m%d)
          SHA=${GITHUB_SHA:0:7}
          IMAGE=ghcr.io/${GITHUB_REPOSITORY@L}
          TAG="${IMAGE}:${DATE}-${SHA}"
          if [ "${{ steps.branch.outputs.branch }}" = "main" ]; then
            TAG="${TAG},${IMAGE}:latest"
          elif [ "${{ steps.branch.outputs.branch }}" = "dev" ]; then
            TAG="${TAG},${IMAGE}:dev"
          fi
          echo "tags=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}