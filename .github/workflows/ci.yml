name: CI

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main, dev, develop]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        # Set health checks to wait for Postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python deps
        run: uv sync

      - name: Lint Python
        run: uv run ruff check backend/

      - name: Security Scan Python (Bandit)
        run: uv run bandit -r backend/ -x backend/tests,backend/seed_data.py,backend/seed_heavy.py

      - name: Test Python
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/testdb
        run: uv run pytest -v

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Type check frontend
        run: cd frontend && npx tsc --noEmit

      - name: Build frontend
        run: cd frontend && npm run build

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract branch name
        id: branch
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"

      - name: Generate docker tags
        id: tags
        run: |
          DATE=$(date +%Y%m%d)
          SHA=${GITHUB_SHA:0:7}
          IMAGE=ghcr.io/${GITHUB_REPOSITORY@L}
          TAG="${IMAGE}:${DATE}-${SHA}"
          if [ "${{ steps.branch.outputs.branch }}" = "main" ]; then
            TAG="${TAG},${IMAGE}:latest"
          elif [ "${{ steps.branch.outputs.branch }}" = "dev" ] || [ "${{ steps.branch.outputs.branch }}" = "develop" ]; then
            TAG="${TAG},${IMAGE}:dev"
          fi
          echo "tags=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max