services:
  app:
    # 默认使用预构建镜像。如果你想在本地修改代码并构建，请注释掉 image 并解开 build 封印。
    image: ghcr.io/qingmuhy744/tokenmeter:latest
    # build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./bin/tm:/usr/local/bin/tm:ro
    environment:
      - DATABASE_URL=postgresql://tm_user:tm_password@db:5432/tokenmeter

      # 生产环境必须设置固定 SECRET_KEY；不配置会自动生成随机密钥，容器重启后会话全部失效
      # SECRET_KEY=replace-with-a-long-random-secret
      # HTTP_PROXY=http://host.docker.internal:7890
      # HTTPS_PROXY=http://host.docker.internal:7890
      # NO_PROXY=localhost,127.0.0.1
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=tm_user
      - POSTGRES_PASSWORD=tm_password
      - POSTGRES_DB=tokenmeter
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tm_user -d tokenmeter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg-data:
